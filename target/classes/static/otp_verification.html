<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP | MindMate</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #89f7fe, #66a6ff);
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px #999;
      width: 320px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Verify OTP</h2>
    <p>Enter the 6-digit OTP sent to your email.</p>

    <input type="text" id="otp" placeholder="Enter OTP" maxlength="6" pattern="\d{6}" required>
    <button onclick="verifyOtp()">Verify OTP</button>
  </div>

  <script>
    // Check if email is saved in session storage
    const email = sessionStorage.getItem("resetEmail");
    if (!email) {
      alert("No email found. Please go back and request OTP again.");
      window.location.href = "forgot_password.html"; // redirect to OTP request page
    }

    async function verifyOtp() {
      const otp = document.getElementById("otp").value.trim();

      if (!otp) {
        alert("Please enter the OTP.");
        return;
      }

      try {
        const res = await fetch("http://localhost:8080/api/auth/verify-otp", { // corrected endpoint
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp })
        });

        const data = await res.json();

        if (res.ok && data.message.includes("successfully")) {
          alert("OTP verified!");
          window.location.href = "reset_password.html"; // redirect to reset password
        } else {
          alert(data.message || "Invalid OTP. Please try again.");
        }
      } catch (error) {
        console.error(error);
        alert("Server error. Please try again later.");
      }
    }
  </script>
</body>
</html>
